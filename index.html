<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Summary</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main">
    <div class="result">
    <p id="p1">Your Result</p>

    <div class="score">
        <h1>76</h1>
        <p id="p2">of 100</p>
    </div>
    <h2>Great</h2>
    <p id="p3">You scored higher than 65% of the people who have taken these tests.</p>
    </div>


    <div class="summary">
        <h3>Summary</h3>

        <div class="reaction">
            <img src="icon-reaction.svg" alt="photo">
            <p id="p4">Reaction</p>
            <p id="p5">
                <span id="front">80 </span>
                <span id="back"> / 100</span>
            </p>
        </div> 

        <div class="memory">
            <img src="icon-memory.svg" alt="photo">
            <p id="p4">Memory</p>
            <p id="p5">
                <span id="front">92 </span>
                <span id="back"> / 100</span>
            </p>
        </div>
        
         <div class="verbal">
            <img src="icon-verbal.svg" alt="photo">
            <p id="p4">Verbal</p>
            <p id="p5">
                <span id="front">61 </span>
                <span id="back"> / 100</span>
            </p>
        </div>

         <div class="visual">
            <img src="icon-visual.svg" alt="photo">
            <p id="p4">Visual</p>
            <p id="p5">
                <span id="front">73 </span>
                <span id="back"> / 100</span>
            </p>
        </div>
        <div id="continue">Continue</div>
    </div>
    </div>
</body>
</html>
